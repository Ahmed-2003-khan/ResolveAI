name: Deploy

# Triggered after CI completes successfully on main/master.
# Builds the production Docker image, pushes to GHCR, then SSHs into
# the server to pull and restart the stack.
on:
  workflow_run:
    workflows: [CI]
    branches: [main, master]
    types: [completed]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    # Only deploy when CI passed
    if: github.event.workflow_run.conclusion == 'success'

    permissions:
      contents: read
      packages: write   # push to GHCR

    steps:
      - uses: actions/checkout@v4

      # ── Docker build + push to GHCR ─────────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push production image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── SSH deploy ───────────────────────────────────────────────────────────
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          # Pull the new image and restart api + worker without downtime.
          # The server must have docker-compose.prod.yml + .env in ~/resolveai.
          script: |
            set -e
            cd ~/resolveai

            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            IMAGE="ghcr.io/${{ github.repository }}:latest"
            docker pull "$IMAGE"

            # Export the image tag so compose.prod.yml can reference it
            export RESOLVEAI_IMAGE="$IMAGE"

            docker compose -f docker-compose.prod.yml up -d --no-build api worker

            # Wait for the api to be healthy (max 60s)
            timeout 60 bash -c \
              'until docker compose -f docker-compose.prod.yml exec -T api \
                curl -sf http://localhost:8000/healthz; do sleep 3; done'

            echo "Deploy complete — $(date -u)"
