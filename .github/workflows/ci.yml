name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

jobs:
  # ── Lint ─────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint tools
        run: pip install ruff black

      - name: Ruff
        run: ruff check app tests scripts

      - name: Black
        run: black --check app tests scripts

  # ── Unit + Integration Tests ──────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: resolveai
          POSTGRES_PASSWORD: resolveai
          POSTGRES_DB: resolveai
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U resolveai"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://resolveai:resolveai@localhost:5432/resolveai
      REDIS_URL: redis://localhost:6379/0
      APP_ENV: testing
      APP_SECRET_KEY: ci-secret-not-for-prod
      LOG_LEVEL: WARNING
      # LLM keys — integration tests mock all LLM/embedding calls
      OPENAI_API_KEY: sk-dummy-ci
      OPENAI_DEFAULT_MODEL: gpt-4o-mini
      OPENAI_EMBEDDING_MODEL: text-embedding-3-small
      GROQ_API_KEY: gsk-dummy-ci
      OLLAMA_BASE_URL: http://localhost:11434
      # Langfuse — dummy, observability is no-op in tests
      LANGFUSE_PUBLIC_KEY: pk-lf-dummy
      LANGFUSE_SECRET_KEY: sk-lf-dummy
      LANGFUSE_HOST: http://localhost:3000
      # Admin
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin
      # Semantic cache
      SEMANTIC_CACHE_SIMILARITY_THRESHOLD: "0.97"
      SEMANTIC_CACHE_TTL_HOURS: "24"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system deps (asyncpg + sentence-transformers)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libpq-dev build-essential

      - name: Install Python deps
        run: pip install --upgrade pip && pip install -e ".[dev]"

      - name: Run migrations
        run: alembic upgrade head

      - name: Seed database
        run: python -m scripts.seed_db

      - name: Unit tests
        run: pytest tests/unit -v --cov=app --cov-report=xml --cov-report=term-missing

      - name: Integration tests
        run: pytest tests/integration -v --cov=app --cov-append --cov-report=xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  # ── Eval Harness (smoke — first 10 cases, on main only) ───────────────────────
  eval:
    name: Eval Smoke
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: resolveai
          POSTGRES_PASSWORD: resolveai
          POSTGRES_DB: resolveai
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U resolveai"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://resolveai:resolveai@localhost:5432/resolveai
      REDIS_URL: redis://localhost:6379/0
      APP_ENV: testing
      APP_SECRET_KEY: ci-secret-not-for-prod
      LOG_LEVEL: WARNING
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_DEFAULT_MODEL: gpt-4o-mini
      OPENAI_EMBEDDING_MODEL: text-embedding-3-small
      GROQ_API_KEY: gsk-dummy-ci
      OLLAMA_BASE_URL: http://localhost:11434
      LANGFUSE_PUBLIC_KEY: pk-lf-dummy
      LANGFUSE_SECRET_KEY: sk-lf-dummy
      LANGFUSE_HOST: http://localhost:3000
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin
      SEMANTIC_CACHE_SIMILARITY_THRESHOLD: "0.97"
      SEMANTIC_CACHE_TTL_HOURS: "24"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libpq-dev build-essential

      - name: Install Python deps
        run: pip install --upgrade pip && pip install -e ".[dev]"

      - name: Run migrations
        run: alembic upgrade head

      - name: Seed database
        run: python -m scripts.seed_db

      - name: Ingest KB articles
        run: python -m scripts.ingest_kb

      - name: Eval — first 10 cases
        run: python -m tests.eval.run_eval --limit 10 --html reports/eval_smoke.html

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-smoke-report
          path: reports/eval_smoke.html
