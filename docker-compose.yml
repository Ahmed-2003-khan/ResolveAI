services:
  # ── PostgreSQL 16 + pgvector ──────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    container_name: resolveai_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-resolveai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-resolveai}
      POSTGRES_DB: ${POSTGRES_DB:-resolveai}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-resolveai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: resolveai_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Langfuse v2 (self-hosted observability — pinned to v2, no ClickHouse needed)
  langfuse:
    image: langfuse/langfuse:2
    container_name: resolveai_langfuse
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://resolveai:resolveai@db:5432/langfuse
      NEXTAUTH_SECRET: langfuse-secret-change-me
      SALT: langfuse-salt-change-me
      NEXTAUTH_URL: http://localhost:3000
      TELEMETRY_ENABLED: "false"

  # ── ResolveAI API ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: resolveai_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-resolveai}:${POSTGRES_PASSWORD:-resolveai}@db:5432/${POSTGRES_DB:-resolveai}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── ARQ Worker ────────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: resolveai_worker
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-resolveai}:${POSTGRES_PASSWORD:-resolveai}@db:5432/${POSTGRES_DB:-resolveai}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/app
    command: python -m arq app.workers.arq_settings.WorkerSettings

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: resolveai_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    depends_on:
      - api

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: resolveai_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-grafana}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/resolveai.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  # ── Ollama (local LLM — commented out by default, CPU-heavy) ──────────────
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: resolveai_ollama
  #   restart: unless-stopped
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   # Uncomment for GPU support:
  #   # deploy:
  #   #   resources:
  #   #     reservations:
  #   #       devices:
  #   #         - capabilities: [gpu]

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  # ollama_data:
