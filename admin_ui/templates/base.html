<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ResolveAI Admin{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <style>
    body { background-color: #f8f9fa; }
    .navbar-brand { font-weight: 700; letter-spacing: .5px; }
    .node-badge { font-size: .75rem; padding: .2em .5em; }
    .audit-card { border-left: 3px solid #0d6efd; }
    .msg-inbound { background: #e9ecef; border-radius: 12px 12px 12px 0; }
    .msg-outbound { background: #0d6efd; color: #fff; border-radius: 12px 12px 0 12px; }
    .chat-bubble { max-width: 75%; padding: .5rem .9rem; margin-bottom: .5rem; }
    pre { white-space: pre-wrap; word-break: break-word; font-size: .82rem; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="/admin/conversations">&#x1F916; ResolveAI</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link {% if request.url.path.startswith('/admin/conversations') %}active{% endif %}"
               href="/admin/conversations">Conversations</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.url.path.startswith('/admin/kb') %}active{% endif %}"
               href="/admin/kb">Knowledge Base</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.url.path.startswith('/admin/metrics') %}active{% endif %}"
               href="/admin/metrics">Metrics</a>
          </li>
        </ul>
        <span class="navbar-text text-secondary small">Admin Panel</span>
      </div>
    </div>
  </nav>

  <div class="container-fluid py-4 px-4">
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
